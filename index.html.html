<!DOCTYPE html>
<html lang="es">
<head>

   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmisión de Fútbol | En Vivo</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f0f0f;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Marcador Superior */
        header {
            background-color: #1a1a1a;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #2ecc71;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .scoreboard {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score {
            background-color: #333;
            padding: 5px 15px;
            border-radius: 5px;
            color: #2ecc71;
        }

        .live-indicator {
            background-color: #e74c3c;
            color: white;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 0.7rem;
            vertical-align: middle;
            margin-left: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Contenedor del Video */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .video-container {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 1px solid #333;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Información del Partido */
        .match-info {
            width: 100%;
            max-width: 1100px;
            margin-top: 20px;
            padding: 0 10px;
        }

        .match-title {
            font-size: 1.4rem;
            margin: 0;
            color: #eee;
        }

        .match-details {
            color: #888;
            margin-top: 5px;
            font-size: 0.9rem;
        }

        /* Footer Simple */
        footer {
            padding: 15px;
            text-align: center;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>
     

<header>
    <div class="scoreboard">
        <span>Real Madrid</span>
        <span class="score">0 - 0</span>
        <span>Manchester City</span>
        <span class="live-indicator">EN VIVO</span>
    </div>
</header>

<main>
    <div class="video-container">
        <div style="text-align: center; color: #444;">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <p>Cargando señal de video...</p>
        </div>
        
        </div>

    <div class="match-info">
        <h1 class="match-title">Octavos de final</h1>
        <p class="match-details">Estadio Santiago Bernabeu • Tiempo transcurrido: 0'</p>
    </div>
</main>

<footer>
    &copy; 2026 Sports Stream - Todos los derechos reservados.
</footer>

</body>
</html>
